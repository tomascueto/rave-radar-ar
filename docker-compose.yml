version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rave_radar_postgres
    environment:
      POSTGRES_USER: rave_radar
      POSTGRES_PASSWORD: rave_radar_pass
      POSTGRES_DB: rave_radar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rave_radar_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: